name: Monorepo CI

on:
  pull_request:
    branches: [main, master, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
  push:
    branches: [main, master, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      run_contract_tests:
        description: "Run contracts integration tests (requires ALGOD secrets)"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.24.0"
  DEFAULT_ALGOD_URL: "https://testnet-api.algonode.cloud"
  DEFAULT_ALGOD_PORT: "443"
  DEFAULT_ALGOD_NETWORK: "testnet"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    name: Frontend - format, lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  contracts-build:
    name: Contracts - format, lint, compile
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: contracts/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Compile contracts
        env:
          ALGOD_SERVER: ${{ vars.NEXT_PUBLIC_ALGOD_URL || env.DEFAULT_ALGOD_URL }}
          ALGOD_PORT: ${{ vars.ALGOD_PORT || env.DEFAULT_ALGOD_PORT }}
          ALGOD_TOKEN: ${{ vars.ALGOD_TOKEN || '' }}
          NEXT_PUBLIC_ALGOD_URL: ${{ vars.NEXT_PUBLIC_ALGOD_URL || env.DEFAULT_ALGOD_URL }}
          NEXT_PUBLIC_ALGOD_NETWORK: ${{ vars.NEXT_PUBLIC_ALGOD_NETWORK || env.DEFAULT_ALGOD_NETWORK }}
        run: pnpm compile-contract

  contracts-tests:
    name: Contracts - integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: contracts-build
    environment: contracts-testnet
    if: >-
      ${{
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.run_contract_tests == true
        ) || (
          github.event_name != 'workflow_dispatch' &&
          secrets.ALGOD_SERVER != '' &&
          secrets.ALGOD_PORT != '' &&
          secrets.INDEXER_SERVER != '' &&
          secrets.INDEXER_TOKEN != '' &&
          secrets.INDEXER_PORT != ''
        )
      }}
    defaults:
      run:
        working-directory: contracts
    env:
      ALGOD_SERVER: ${{ secrets.ALGOD_SERVER }}
      ALGOD_TOKEN: ${{ secrets.ALGOD_TOKEN || '' }}
      ALGOD_PORT: ${{ secrets.ALGOD_PORT }}
      INDEXER_SERVER: ${{ secrets.INDEXER_SERVER }}
      INDEXER_TOKEN: ${{ secrets.INDEXER_TOKEN }}
      INDEXER_PORT: ${{ secrets.INDEXER_PORT }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Validate required contract test secrets
        run: |
          if [ -z "$ALGOD_SERVER" ]; then
            echo "Missing required secret: ALGOD_SERVER."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: contracts/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run contract tests
        run: pnpm test
