name: Spell check

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "frontend/**"
      - "contracts/**"
      - ".github/workflows/typos.yml"
      - "_typos.toml"
  push:
    branches: [main, master, develop]
    paths:
      - "frontend/**"
      - "contracts/**"
      - ".github/workflows/typos.yml"
      - "_typos.toml"
  merge_group:
    types: [checks_requested]

concurrency:
  group: typos-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typos:
    name: Typos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Check spelling
        uses: crate-ci/typos@1401a6733807403ecb902fb23056198f744f5020
        with:
          files: frontend contracts
